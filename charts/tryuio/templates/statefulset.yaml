apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  serviceName: {{ .Release.Name }}-headless
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: {{ .Release.Name }}
              topologyKey: kubernetes.io/hostname
      containers:
        - name: {{ .Release.Name }}
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          command:
            - sh
            - -c
            - |
              ORDINAL=$(echo $HOSTNAME | rev | cut -d- -f1 | rev)
              SVC={{ .Release.Name }}-headless.{{ .Release.Namespace }}.svc.cluster.local
              PEERS=""
              for i in {{ range $i := until (int .Values.replicas) }}{{ $i }} {{ end }}; do
                if [ "$i" != "$ORDINAL" ]; then
                  [ -n "$PEERS" ] && PEERS="${PEERS},"
                  PEERS="${PEERS}http://{{ .Release.Name }}-${i}.${SVC}:8080"
                fi
              done
              export PEERS
              exec ./server
          ports:
            - containerPort: {{ .Values.port }}
          env:
            - name: DATA_DIR
              value: {{ .Values.storage.mountPath }}
            - name: PORT
              value: {{ .Values.port | quote }}
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: api-key
          volumeMounts:
            - name: data
              mountPath: {{ .Values.storage.mountPath }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          hostPath:
            path: {{ .Values.storage.hostPath }}
            type: DirectoryOrCreate
