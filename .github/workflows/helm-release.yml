name: Release Helm Chart

on:
  push:
    branches:
      - main
    paths:
      - charts/**

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package chart
        run: |
          mkdir -p docs/
          helm package charts/tryuio -d docs/

      - name: Update Helm repo index
        run: helm repo index docs/ --url https://tryuuu.github.io/tryuio

      - name: Commit and push docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: release helm chart $(helm show chart charts/tryuio | grep '^version:' | awk '{print $2}')"
          git push
